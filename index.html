<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #121826;
            color: white;
            font-family: sans-serif;
        }
        .input-box {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 18px;
            width: 100%;
        }
        .btn {
            background-color: #e0e0e0;
            color: black;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 18px;
            font-weight: 500;
            width: 100%;
        }
        .btn:hover { background-color: #d0d0d0; }
        .btn-del { background: #ff4444; color: white; }
        .btn-add { background: #44aa44; color: white; }
        .btn-print { background: #007bff; color: white; }

        .output-box {
            background: #000;
            color: #39FF14;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            min-height: 150px;
            white-space: pre-line;
        }

        /* STYLE STRUK */
        #strukContainer {
            display: none;
            background: #fff;
            color: #000;
            width: 300px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
        }
        .divider {
            border-bottom: 1px dashed #000;
            margin: 6px 0;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            font-size: 14px;
        }
        .total {
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body class="p-4">

    <h1 class="text-center text-3xl font-bold mb-6">Kasir Travel</h1>

    <!-- INPUT AREA -->
    <div class="bg-gray-800 rounded-xl p-4 mb-6">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-300 mb-1">Penumpang Cash</label>
                <input type="number" id="cash_jml" class="input-box" placeholder="" oninput="hitung()">
            </div>
            <div>
                <label class="block text-gray-300 mb-1">Penumpang QR</label>
                <input type="number" id="qr_jml" class="input-box" placeholder="" oninput="hitung()">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-300 mb-1">QR Bandara (Nominal)</label>
                <input type="text" id="qr_bandara_nilai" class="input-box" placeholder="" oninput="formatUang(this); hitung()">
            </div>
            <div class="flex items-end">
                <p class="text-yellow-400 text-sm">*Input nominal langsung</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-300 mb-1">Carter Cash</label>
                <input type="text" id="cash_hrg" class="input-box" placeholder="" oninput="formatUang(this); hitung()">
            </div>
            <div>
                <label class="block text-gray-300 mb-1">Carter QR</label>
                <input type="text" id="qr_hrg" class="input-box" placeholder="" oninput="formatUang(this); hitung()">
            </div>
        </div>

        <!-- PEMASUKAN -->
        <div class="mb-2">
            <label class="block text-gray-300 mb-1">➕ PEMASUKAN TAMBAHAN</label>
            <div id="list_pemasukan">
                <div class="grid grid-cols-12 gap-2 mb-2">
                    <div class="col-span-5"><input type="text" class="input-box ket" placeholder="Keterangan" oninput="hitung()"></div>
                    <div class="col-span-5"><input type="text" class="input-box nilai" placeholder="0" oninput="formatUang(this); hitung()"></div>
                    <div class="col-span-2"><button class="btn btn-del h-full" onclick="hapusItem(this)">Hapus</button></div>
                </div>
            </div>
            <button class="btn btn-add" onclick="tambahItem('list_pemasukan')">+ Tambah Pemasukan</button>
        </div>

        <!-- PENGELUARAN -->
        <div class="mb-2 mt-4">
            <label class="block text-gray-300 mb-1">➖ PENGELUARAN TAMBAHAN</label>
            <div id="list_pengeluaran">
                <div class="grid grid-cols-12 gap-2 mb-2">
                    <div class="col-span-5"><input type="text" class="input-box ket" placeholder="Keterangan" oninput="hitung()"></div>
                    <div class="col-span-5"><input type="text" class="input-box nilai" placeholder="0" oninput="formatUang(this); hitung()"></div>
                    <div class="col-span-2"><button class="btn btn-del h-full" onclick="hapusItem(this)">Hapus</button></div>
                </div>
            </div>
            <button class="btn btn-add" onclick="tambahItem('list_pengeluaran')">+ Tambah Pengeluaran</button>
        </div>
    </div>

    <!-- TOMBOL -->
    <div class="grid grid-cols-2 gap-3 mb-6">
        <button class="btn" onclick="hitung()">Hitung</button>
        <button class="btn" onclick="copyText()">Copy</button>
        <button class="btn" onclick="kirimWA()">WhatsApp</button>
        <button class="btn btn-print" onclick="tampilStruk()">Cetak Struk</button>
    </div>

    <!-- HASIL HITUNG -->
    <div class="bg-gray-800 rounded-xl p-4 mb-6">
        <div id="output" class="output-box"></div>
    </div>

    <!-- TEMPLATE STRUK -->
    <div id="strukContainer">
        <div id="isiStruk"></div>
        <div class="divider"></div>
        <div class="row total">
            <span>SISA UANG:</span>
            <span id="totalStruk"></span>
        </div>
    </div>

    <script>
        const HARGA_STANDAR = 180000;
        const BIAYA_BBM = 470000;
        let strukText = "";

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }
        function formatUang(input) {
            let nilai = input.value.replace(/\D/g, "");
            input.value = nilai ? formatNumber(nilai) : "";
        }
        function getNilaiAngka(text) {
            return parseInt(text.replace(/\D/g, "")) || 0;
        }
        function hapusItem(btn) {
            btn.closest('.grid').remove();
            hitung();
        }
        function tambahItem(id) {
            const container = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'grid grid-cols-12 gap-2 mb-2';
            div.innerHTML = `
                <div class="col-span-5"><input type="text" class="input-box ket" placeholder="Keterangan" oninput="hitung()"></div>
                <div class="col-span-5"><input type="text" class="input-box nilai" placeholder="0" oninput="formatUang(this); hitung()"></div>
                <div class="col-span-2"><button class="btn btn-del h-full" onclick="hapusItem(this)">Hapus</button></div>
            `;
            container.appendChild(div);
        }

        function hitung() {
            const cj = parseInt(document.getElementById('cash_jml').value) || 0;
            const qj = parseInt(document.getElementById('qr_jml').value) || 0;
            const qb = getNilaiAngka(document.getElementById('qr_bandara_nilai').value);
            const ch = getNilaiAngka(document.getElementById('cash_hrg').value);
            const qh = getNilaiAngka(document.getElementById('qr_hrg').value);

            let totalPemasukanLain = 0, textPemasukan = "";
            document.querySelectorAll('#list_pemasukan .grid').forEach(row => {
                const ket = row.querySelector('.ket').value;
                const nilai = getNilaiAngka(row.querySelector('.nilai').value);
                if(nilai > 0) { totalPemasukanLain += nilai; textPemasukan += `\n${ket||'Pemasukan'} = ${formatNumber(nilai)}`; }
            });

            let totalPengeluaranLain = 0, textPengeluaran = "";
            document.querySelectorAll('#list_pengeluaran .grid').forEach(row => {
                const ket = row.querySelector('.ket').value;
                const nilai = getNilaiAngka(row.querySelector('.nilai').value);
                if(nilai > 0) { totalPengeluaranLain += nilai; textPengeluaran += `\n${ket||'Pengeluaran'} = ${formatNumber(nilai)}`; }
            });

            const totalPenumpang = cj + qj;
            const totalCash = cj * HARGA_STANDAR;
            const totalQR = qj * HARGA_STANDAR;
            const totalQRBandara = qb;
            // HITUNG SISA UANG: HANYA CASH + PEMASUKAN TAMBAHAN - BBM - PENGELUARAN
            const totalPendapatan = totalCash + ch + totalPemasukanLain;
            const totalPengeluaran = BIAYA_BBM + totalPengeluaranLain;
            const sisaUang = totalPendapatan - totalPengeluaran;

            if (totalPenumpang === 0 && totalQRBandara === 0 && ch === 0 && qh === 0 && totalPemasukanLain === 0 && totalPengeluaranLain === 0) {
                document.getElementById('output').innerText = "";
                strukText = "";
                return;
            }

            let text = `Penumpang ${totalPenumpang}
------------------------`;
            if(cj>0) text += `\nCash ${cj} x ${formatNumber(HARGA_STANDAR)} = ${formatNumber(totalCash)}`;
            if(qj>0) text += `\nQR ${qj} x ${formatNumber(HARGA_STANDAR)} = ${formatNumber(totalQR)}`;
            if(qb>0) text += `\nQR Bandara = ${formatNumber(totalQRBandara)}`;
            if(ch>0) text += `\nCarter Cash = ${formatNumber(ch)}`;
            if(qh>0) text += `\nCarter QR = ${formatNumber(qh)}`;
            text += textPemasukan;
            text += `\n------------------------
BBM = ${formatNumber(BIAYA_BBM)}`;
            text += textPengeluaran;
            text += `\n------------------------
Sisa Uang ${formatNumber(sisaUang)}`;

            strukText = text;
            document.getElementById('output').innerText = strukText;
        }

        // CETAK STRUK LANGSUNG BISA DIBAGIKAN
        function tampilStruk() {
            hitung();
            if(!strukText) { 
                alert("Masukkan data dulu ya!"); 
                return; 
            }

            let isi = "";
            let totalAkhir = 0;
            const baris = strukText.split('\n');
            
            baris.forEach(line => {
                if(line.includes('Penumpang')) {
                    isi += `<div class="row"><span>Penumpang</span><span>${line.split(' ')[1]}</span></div>`;
                } 
                else if(line.includes('------------------------')) {
                    isi += `<div class="divider"></div>`;
                }
                else if(line.includes('=')) {
                    const [kiri, kanan] = line.split('=');
                    isi += `<div class="row"><span>${kiri.trim()}</span><span>${kanan.trim()}</span></div>`;
                } 
                else if(line.includes('Sisa Uang')) {
                    totalAkhir = line.split(' ')[2];
                }
            });

            document.getElementById('isiStruk').innerHTML = isi;
            document.getElementById('totalStruk').innerText = totalAkhir;
            document.getElementById('strukContainer').style.display = 'block';

            // UBAH JADI GAMBAR DAN LANGSUNG BAGIKAN
            html2canvas(document.getElementById('strukContainer')).then(canvas => {
                canvas.toBlob(function(blob) {
                    const file = new File([blob], "struk.png", { type: "image/png" });
                    
                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: 'Struk Travel',
                        });
                    } else {
                        // Jika tidak support, buka gambar di tab baru
                        const img = new Image();
                        img.src = canvas.toDataURL();
                        const win = window.open("", "_blank");
                        win.document.write(img.outerHTML);
                    }
                });
            });
        }

        function copyText() {
            if(!strukText) return;
            navigator.clipboard.writeText(strukText).then(() => alert("Disalin!"));
        }
        function kirimWA() {
            if(!strukText) return;
            window.open(`https://wa.me/?text=${encodeURIComponent(strukText)}`, '_blank');
        }
    </script>

</body>
                </html>
